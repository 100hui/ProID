<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Sphere - Authentication</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #F6F5FB;
        }

        .brand-purple {
            color: #5D43DA;
        }

        .bg-brand-purple {
            background-color: #5D43DA;
        }

        .bg-brand-purple-light {
            background-color: #F0EDFF;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="flex justify-center items-center min-h-screen p-0 sm:p-4">

    <!-- Mobile Device Frame Container -->
    <div
        class="w-full sm:max-w-[412px] h-screen sm:h-[892px] bg-[#F9F8FD] sm:rounded-[48px] sm:shadow-2xl overflow-hidden sm:border-[8px] sm:border-gray-900 relative flex flex-col">

        <!-- Status Bar Mimic -->
        <div
            class="hidden sm:flex w-full px-8 pt-4 pb-2 justify-between items-center text-xs font-semibold text-gray-700 z-10">
            <span>9:41</span>
            <div class="flex items-center space-x-1.5">
                <i class="fa-solid fa-signal"></i>
                <i class="fa-solid fa-wifi"></i>
                <i class="fa-solid fa-battery-full text-base"></i>
            </div>
        </div>

        <!-- Layout Central Content Wrapper -->
        <div class="flex-1 overflow-y-auto px-6 py-8 flex flex-col justify-between no-scrollbar">

            <!-- App Identity Branding Block -->
            <div class="text-center space-y-2 mt-4">
                <div class="w-14 h-14 mx-auto flex items-center justify-center overflow-hidden">
                    <img src="Images/safespherelogo.png" alt="SafeSphere Logo" class="w-full h-full object-contain">
                </div>
                <h1 class="text-2xl font-black text-gray-900 tracking-tight">Safe Sphere</h1>
                <p class="text-xs text-gray-400 font-medium">Your digital space for dynamic campus mental wellness.</p>
            </div>

            <!-- TAB TOGGLE MECHANISMS -->
            <div class="bg-gray-100 p-1.5 rounded-2xl flex items-center mt-8 border border-gray-200/40">
                <button onclick="switchTab('login')" id="tabBtn-login"
                    class="flex-1 text-center py-2.5 rounded-xl text-xs font-black transition-all bg-white text-gray-900 shadow-sm">
                    Sign In
                </button>
                <button onclick="switchTab('signup')" id="tabBtn-signup"
                    class="flex-1 text-center py-2.5 rounded-xl text-xs font-bold transition-all text-gray-500 hover:text-purple-600">
                    Create Account
                </button>
            </div>

            <!-- INTERACTIVE FORM CONTAINERS -->
            <div class="flex-1 flex flex-col justify-center my-6">
                <form id="authForm" action="index.html" class="space-y-4">

                    <!-- Shared Element: Student Email -->
                    <div class="space-y-1">
                        <label
                            class="text-[10px] font-black text-gray-400 uppercase tracking-wider block px-0.5">Student
                            Email Address</label>
                        <div
                            class="relative flex items-center bg-white border border-purple-100 rounded-xl px-3.5 py-3 shadow-sm focus-within:border-brand-purple transition-all">
                            <i class="fa-regular fa-envelope text-gray-400 mr-2.5 text-sm"></i>
                            <input type="email" required placeholder="e.g., student@mymail.com"
                                class="w-full bg-transparent border-none outline-none text-xs text-gray-700 font-medium placeholder-gray-300">
                        </div>
                    </div>

                    <!-- Shared Element: Password Input -->
                    <div class="space-y-1">
                        <label
                            class="text-[10px] font-black text-gray-400 uppercase tracking-wider block px-0.5">Password</label>
                        <div
                            class="relative flex items-center bg-white border border-purple-100 rounded-xl px-3.5 py-3 shadow-sm focus-within:border-brand-purple transition-all">
                            <i class="fa-solid fa-lock text-gray-400 mr-2.5 text-sm"></i>
                            <input type="password" required placeholder="••••••••••••"
                                class="w-full bg-transparent border-none outline-none text-xs text-gray-700 font-medium placeholder-gray-300">
                        </div>
                    </div>

                    <!-- SIGN UP MATRIX ELEMENTS (Hidden initially by default block filters) -->
                    <div id="signupFields" class="space-y-4 hidden">
                        <!-- Dropdown Element: Pick Poly -->
                        <div class="space-y-1">
                            <label
                                class="text-[10px] font-black text-gray-400 uppercase tracking-wider block px-0.5">Choose
                                Polytechnic</label>
                            <div
                                class="relative flex items-center bg-white border border-purple-100 rounded-xl px-3.5 py-3 shadow-sm focus-within:border-brand-purple transition-all">
                                <i class="fa-solid fa-school text-gray-400 mr-2.5 text-sm"></i>
                                <select
                                    class="w-full bg-transparent border-none outline-none text-xs text-gray-700 font-semibold cursor-pointer">
                                    <option value="" disabled selected>Select your institution...</option>
                                    <option value="sp">Singapore Polytechnic (SP)</option>
                                    <option value="np">Ngee Ann Polytechnic (NP)</option>
                                    <option value="nyp">Nanyang Polytechnic (NYP)</option>
                                    <option value="tp">Temasek Polytechnic (TP)</option>
                                    <option value="rp">Republic Polytechnic (RP)</option>
                                </select>
                            </div>
                        </div>

                        <!-- Dropdown Element: Pick Academic School -->
                        <div class="space-y-1">
                            <label
                                class="text-[10px] font-black text-gray-400 uppercase tracking-wider block px-0.5">Choose
                                Academic School</label>
                            <div
                                class="relative flex items-center bg-white border border-purple-100 rounded-xl px-3.5 py-3 shadow-sm focus-within:border-brand-purple transition-all">
                                <i class="fa-solid fa-graduation-cap text-gray-400 mr-2.5 text-sm"></i>
                                <select
                                    class="w-full bg-transparent border-none outline-none text-xs text-gray-700 font-semibold cursor-pointer">
                                    <option value="" disabled selected>Select academic block...</option>
                                    <option value="ict">School of ICT</option>
                                    <option value="eng">School of Engineering</option>
                                    <option value="biz">School of Business & Accountancy</option>
                                    <option value="des">School of Health Sciences</option>
                                    <option value="cls">School of Life Sciences & Chemical</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Submit Submit Form Button Docker -->
                    <div class="pt-2">
                        <button type="submit" id="submitBtn"
                            class="w-full bg-gradient-to-r from-purple-600 to-brand-purple text-white py-4 rounded-2xl font-black text-xs uppercase tracking-wider shadow-lg shadow-purple-600/20 hover:opacity-95 transition-all active:scale-[0.98]">
                            Sign In
                        </button>
                    </div>

                </form>
            </div>

            <!-- Disclaimer Footer Layer -->
            <div class="text-center text-[10px] text-gray-400 font-medium py-2">
                🔒 Protected under verified campus secure account protection schemas.
            </div>

        </div>

    </div>

    <!-- TAB INTERACTIVE TRANSITION CONTROLLER -->
    <script>
        function switchTab(mode) {
            const loginBtn = document.getElementById('tabBtn-login');
            const signupBtn = document.getElementById('tabBtn-signup');
            const signupFields = document.getElementById('signupFields');
            const submitBtn = document.getElementById('submitBtn');

            if (mode === 'signup') {
                // Style Active Setup
                signupBtn.className = "flex-1 text-center py-2.5 rounded-xl text-xs font-black transition-all bg-white text-gray-900 shadow-sm";
                loginBtn.className = "flex-1 text-center py-2.5 rounded-xl text-xs font-bold transition-all text-gray-500 hover:text-purple-600";

                // Show Dynamic Field Form Parameters
                signupFields.classList.remove('hidden');
                submitBtn.innerText = "Create Free Account";
            } else {
                // Style Active Setup
                loginBtn.className = "flex-1 text-center py-2.5 rounded-xl text-xs font-black transition-all bg-white text-gray-900 shadow-sm";
                signupBtn.className = "flex-1 text-center py-2.5 rounded-xl text-xs font-bold transition-all text-gray-500 hover:text-purple-600";

                // Hide Dynamic Field Form Parameters
                signupFields.classList.add('hidden');
                submitBtn.innerText = "Sign In";
            }
        }
    </script>

</body>

</html>
