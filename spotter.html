<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pause&Pulse - Spotter Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #F6F5FB;
        }

        .brand-purple {
            color: #5D43DA;
        }

        .bg-brand-purple {
            background-color: #5D43DA;
        }

        .bg-brand-purple-light {
            background-color: #F0EDFF;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="flex justify-center items-center min-h-screen p-0 sm:p-4">

    <!-- Mobile Device Frame Container -->
    <div
        class="w-full sm:max-w-[412px] h-screen sm:h-[892px] bg-[#F9F8FD] sm:rounded-[48px] sm:shadow-2xl overflow-hidden sm:border-[8px] sm:border-gray-900 relative flex flex-col">

        <!-- Status Bar Mimic -->
        <div
            class="hidden sm:flex w-full px-8 pt-4 pb-2 justify-between items-center text-xs font-semibold text-gray-700 z-10">
            <span>9:41</span>
            <div class="flex items-center space-x-1.5">
                <i class="fa-solid fa-signal"></i>
                <i class="fa-solid fa-wifi"></i>
                <i class="fa-solid fa-battery-full text-base"></i>
            </div>
        </div>

        <!-- Scrollable Content Area -->
        <div class="flex-1 px-5 pb-24 pt-2 flex flex-col justify-between no-scrollbar">

            <!-- Top App Header Section -->
            <div class="flex justify-between items-center">
                <span class="text-2xl font-bold brand-purple tracking-tight">Spotter Hub</span>
                <div
                    class="bg-white px-3 py-1.5 rounded-full shadow-sm border border-purple-100 flex items-center space-x-1">
                    <span class="text-xs font-bold text-gray-500">Wallet:</span>
                    <span class="text-xs font-extrabold brand-purple">380 pts</span>
                </div>
            </div>

            <!-- CENTERED HERO MODE SELECTOR -->
            <div class="flex-1 flex flex-col items-center justify-center text-center px-4 space-y-6">
                <!-- Large Colorful Action Icon -->
                <div
                    class="w-20 h-20 bg-gradient-to-br from-teal-500 to-emerald-600 text-white rounded-[28px] flex items-center justify-center text-3xl shadow-xl shadow-emerald-500/20 animate-pulse">
                    <i class="fa-solid fa-bullseye"></i>
                </div>

                <div class="space-y-2">
                    <h2 class="text-2xl font-black text-gray-900 tracking-tight">Spot the Red Flag Arena</h2>
                    <p class="text-xs text-gray-500 max-w-[280px] mx-auto leading-relaxed">
                        Train your mental filters against scam messages, toxic edits, and hidden cyber threats
                        circulating campus networks.
                    </p>
                </div>

                <!-- Big Centered Launch Button -->
                <a href="swipe.html"
                    class="w-full max-w-[280px] bg-gradient-to-r from-teal-600 to-emerald-600 text-white py-4 rounded-2xl font-extrabold text-sm shadow-lg shadow-emerald-600/30 text-center hover:opacity-95 transition-all active:scale-[0.98] block">
                    Launch Swipe Session (+10 pts)
                </a>
            </div>

            <!-- Informational Accent Footer Label -->
            <div class="text-center">
                <span
                    class="text-[10px] font-bold tracking-wider text-purple-400 uppercase bg-purple-50 px-3 py-1.5 rounded-full border border-purple-100">
                    ⚡ Resets Daily at 00:00
                </span>
            </div>

        </div>

        <!-- System Fixed Navigation Bar -->
        <div
            class="absolute bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-purple-100/80 px-4 py-3 flex justify-between items-center z-20 rounded-b-[40px]">
            <a href="index.html"
                class="flex flex-col items-center flex-1 py-1 text-gray-400 hover:text-purple-500 transition-colors">
                <i class="fa-solid fa-house text-base mb-1"></i>
                <span class="text-[10px] font-medium">Home</span>
            </a>
            <a href="spotter.html" class="flex flex-col items-center flex-1 py-1 text-brand-purple">
                <div class="bg-brand-purple-light px-4 py-1 rounded-full mb-1">
                    <i class="fa-solid fa-bullseye text-sm"></i>
                </div>
                <span class="text-[10px] font-bold">Spotter</span>
            </a>
            <a href="ally-network.html"
                class="flex flex-col items-center flex-1 py-1 text-gray-400 hover:text-purple-500 transition-colors">
                <i class="fa-regular fa-comments text-base mb-1"></i>
                <span class="text-[10px] font-medium">Ally</span>
            </a>
            <a href="profile.html"
                class="flex flex-col items-center flex-1 py-1 text-gray-400 hover:text-purple-500 transition-colors">
                <i class="fa-regular fa-user text-base mb-1"></i>
                <span class="text-[10px] font-medium">Profile</span>
            </a>
        </div>

    </div>
</body>

</html>
